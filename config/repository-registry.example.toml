default_repository_id = "nuntius"

[[repository_targets]]
id = "nuntius"
path = "/srv/repos/nuntius"
sandbox_mode = "workspace-write"
allow_channels = ["discord:123456789012345678:234567890123456789"]

# Optional: enable Codex network access for this worker.
# When enabled, networked tasks should keep cloned/downloaded artifacts inside
# the dedicated workspace below instead of scattering them through the primary
# repository. Host-level network policy must still allow outbound access or the
# task will fail at runtime.
# allow_codex_network_access = true
# codex_network_access_workspace_path = "/tmp/nuntius-network/nuntius"
#
# Optional: force a specific approval policy for worker shell commands.
# approval_policy = "never"
#
# Optional: raw `codex -c key=value` overrides applied to the worker. Use this
# to opt into supported Codex runtime capabilities such as sandbox permissions.
# Exact keys and accepted values depend on the installed Codex CLI version.
# codex_config_overrides = ['sandbox_permissions=["<network-permission-from-codex-cli>"]']
